name: Release Helm chart
on:
  push:
    branches:
      - master
    paths:
      - 'charts/dkim-manager/Chart.yaml'
permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
jobs:
  release:
    uses: hsn723/actions/.github/workflows/helm-release.yml@0006fb81cac65f798c4fdb6a3676e329d84272c1 # v1.0.21
    secrets: inherit
    with:
      extra_helm_setup: |
        helm repo add external-dns https://kubernetes-sigs.github.io/external-dns
        helm repo update
      upload_as_oci: true
      chart_name: dkim-manager
